<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anelli - BB Gioielli</title>

<style>
:root{
  --navy:#1E1B4B;
  --coral:#FF6B6B;
  --gold:#FFD93D;
  --cream:#FFFBF0;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#FFFBF0,#F5F0FF);
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
position:sticky;
top:0;
z-index:10;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

nav a{
text-decoration:none;
color:var(--navy);
font-weight:bold;
}

.cart{
position:relative;
cursor:pointer;
font-size:20px;
}

.badge{
position:absolute;
top:-8px;
right:-10px;
background:var(--coral);
color:white;
font-size:12px;
width:18px;
height:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* HEADER */
header{
text-align:center;
padding:80px 20px;
background:linear-gradient(135deg,var(--coral),#FB7185);
color:white;
}

header h1{
font-size:3rem;
margin:0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:60px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.price{
font-size:1.3rem;
font-weight:bold;
color:var(--navy);
margin:10px 0;
}

.btn{
display:inline-block;
padding:10px 18px;
border:none;
background:linear-gradient(135deg,var(--coral),var(--gold));
color:white;
border-radius:50px;
cursor:pointer;
font-weight:bold;
}

.back{
text-align:center;
padding:40px;
}

.back a{
text-decoration:none;
padding:12px 25px;
background:var(--navy);
color:white;
border-radius:50px;
}
</style>
</head>

<body>

<nav>
<a href="index.html">← BB Gioielli</a>

<div class="cart">
🛒
<span class="badge" id="cartCount">0</span>
</div>
</nav>

<header>
<h1>✨ Collezione Anelli</h1>
<p>Eleganza senza tempo</p>
</header>

<section class="grid">

<div class="card">
<h2>Anello Aurora</h2>
<p>Diamante 0.5 carati</p>
<div class="price">€1.250</div>
<button class="btn" onclick="addToCart('Aurora',1250)">Aggiungi al carrello</button>
</div>

<div class="card">
<h2>Anello Verde Eden</h2>
<p>Smeraldo colombiano AAA</p>
<div class="price">€3.200</div>
<button class="btn" onclick="addToCart('Verde Eden',3200)">Aggiungi al carrello</button>
</div>

<div class="card">
<h2>Anello Eternity</h2>
<p>Oro bianco e diamanti</p>
<div class="price">€2.400</div>
<button class="btn" onclick="addToCart('Eternity',2400)">Aggiungi al carrello</button>
</div>

</section>

<div class="back">
<a href="index.html">← Torna alla Home</a>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCart(){
document.getElementById("cartCount").innerText = cart.length;
localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name,price){
cart.push({name,price});
updateCart();
alert(name + " aggiunto al carrello 💍");
}

updateCart();

</script>

</body>
</html>
